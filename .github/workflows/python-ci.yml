name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'
      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install black flake8
      - name: Run black (check)
        run: |
          black --check . || (echo "Run 'black .' locally to format files" && false)
      - name: Run flake8
        run: |
          flake8 . || true
